<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Alumni LinkedIn Profiles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
      padding: 30px;
    }
    h1 {
      margin-bottom: 30px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 12px auto;
      width: 280px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    a {
      text-decoration: none;
      color: #0A66C2;
      font-weight: bold;
    }
    a:hover {
      color: #004182;
    }
  </style>
</head>
<body>

<h1>Alumni LinkedIn Profiles</h1>

<div class="card">
  <a href="https://linkedin.com/in/example1" target="_blank">
    Rahul Sharma
  </a>
</div>

<div class="card">
  <a href="https://linkedin.com/in/example2" target="_blank">
    Priya Mehta
  </a>
</div>

<div class="card">
  <a href="https://linkedin.com/in/example3" target="_blank">
    Aman Verma
  </a>
</div>

</body>
</html>
