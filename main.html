<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni LinkedIn Directory</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Font Awesome for LinkedIn Icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0A66C2, #004182);
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    padding: 40px 20px;
}

h1 {
    font-size: 2.2rem;
    margin-bottom: 10px;
    font-weight: 600;
}

.subtitle {
    margin-bottom: 30px;
    font-weight: 300;
    opacity: 0.9;
}

.search-box {
    margin-bottom: 30px;
}

.search-box input {
    padding: 12px 18px;
    width: 280px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 14px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 900px;
}

.card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.card:hover {
    transform: translateY(-8px);
    background: rgba(255, 255, 255, 0.25);
}

.card a {
    text-decoration: none;
    color: white;
    font-weight: 500;
    font-size: 1.05rem;
}

.card i {
    display: block;
    font-size: 1.8rem;
    margin-bottom: 10px;
}

footer {
    margin-top: 50px;
    font-size: 0.8rem;
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>Alumni LinkedIn Directory</h1>
<p class="subtitle">Connect with our distinguished alumni</p>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search alumni name...">
</div>

<div class="container" id="alumniContainer">

    <div class="card">
        <i class="fab fa-linkedin"></i>
        <a href="https://www.linkedin.com/in/sherry-bhalla-37142a73/" target="_blank" rel="noopener noreferrer">
            Sherry Bhalla
        </a>
    </div>

    <div class="card">
        <i class="fab fa-linkedin"></i>
        <a href="https://www.linkedin.com/in/isha-monga-3a175b48/" target="_blank" rel="noopener noreferrer">
            Isha Monga
        </a>
    </div>

    <div class="card">
        <i class="fab fa-linkedin"></i>
        <a href="https://www.linkedin.com/in/kumardeep-chaudhary-phd-71b79715/" target="_blank" rel="noopener noreferrer">
            Kumardeep Chaudhary
        </a>
    </div>

    <div class="card">
        <i class="fab fa-linkedin"></i>
        <a href="https://www.linkedin.com/in/aprajita-gupta-17a49726a/" target="_blank" rel="noopener noreferrer">
            Aprajita Gupta
        </a>
    </div>

    <div class="card">
        <i class="fab fa-linkedin"></i>
        <a href="https://www.linkedin.com/in/kgupta18/" target="_blank" rel="noopener noreferrer">
            Kanika Gupta
        </a>
    </div>

    <div class="card">
        <i class="fab fa-linkedin"></i>
        <a href="https://www.linkedin.com/in/natasha-nahar-pmp%C2%AE-mba-b3361276/" target="_blank" rel="noopener noreferrer">
            Natasha Nahar
        </a>
    </div>

    <div class="card">
        <i class="fab fa-linkedin"></i>
        <a href="https://www.linkedin.com/in/akshimasharma09/" target="_blank" rel="noopener noreferrer">
            Akshima Sharma
        </a>
    </div>

</div>

<footer>
© 2026 Alumni Network | Built with GitHub Pages
</footer>

<script>
// Search functionality
const searchInput = document.getElementById('searchInput');
const cards = document.querySelectorAll('.card');

searchInput.addEventListener('keyup', function() {
    const filter = searchInput.value.toLowerCase();

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        card.style.display = text.includes(filter) ? "block" : "none";
    });
});
</script>

</body>
</html>
